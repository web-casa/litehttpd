# =============================================================================
# P2 Test Cases — Four-Engine Comparison (Edge Cases - Simplified)
# =============================================================================
# Priority 2: Edge cases and stress tests using existing infrastructure

# ---------------------------------------------------------------------------
# Group: edge_cases (10 cases)
# ---------------------------------------------------------------------------
- id: EC_P2_001
  group: edge_cases
  desc: "URI with encoded space %20"
  method: GET
  path: /_probe/probe.php?test=hello%20world
  compare_mode: mod_lsws
  checks:
    status: 200

- id: EC_P2_002
  group: edge_cases
  desc: "Query string with special chars"
  method: GET
  path: /_probe/probe.php?key=value&special=test
  compare_mode: mod_lsws
  checks:
    status: 200

- id: EC_P2_003
  group: edge_cases
  desc: "Multiple query parameters"
  method: GET
  path: /_probe/probe.php?a=1&b=2&c=3&d=4&e=5
  compare_mode: mod_lsws
  checks:
    status: 200

- id: EC_P2_004
  group: edge_cases
  desc: "Empty query string"
  method: GET
  path: /_probe/probe.php?
  compare_mode: mod_lsws
  checks:
    status: 200

- id: EC_P2_005
  group: edge_cases
  desc: "Path with trailing slash"
  method: GET
  path: /subdir/_probe/probe.php
  compare_mode: mod_lsws
  checks:
    status: 200

- id: EC_P2_006
  group: edge_cases
  desc: "Path without trailing slash"
  method: GET
  path: /_probe/probe.php
  compare_mode: mod_lsws
  checks:
    status: 200

- id: EC_P2_007
  group: edge_cases
  desc: "Case sensitive path — lowercase"
  method: GET
  path: /index.php
  compare_mode: htaccess
  checks:
    status: 200

- id: EC_P2_008
  group: edge_cases
  desc: "Case sensitive path — uppercase"
  method: GET
  path: /INDEX.PHP
  compare_mode: htaccess
  checks:
    status_in: [200, 404]

- id: EC_P2_009
  group: edge_cases
  desc: "Double extension file"
  method: GET
  path: /style.css
  compare_mode: htaccess
  checks:
    status: 200

- id: EC_P2_010
  group: edge_cases
  desc: "Hidden file access attempt"
  method: GET
  path: /.htaccess
  compare_mode: known
  known_diff: "OLS module does not block .ht* — Apache/LSWS deny in core config"
  checks:
    status_in: [403, 404]

