  checks:
    status: 200

# ---------------------------------------------------------------------------
# Group: headers_advanced (8 cases)
# ---------------------------------------------------------------------------
- id: HD_P1_001
  group: headers_advanced
  desc: "Header set with custom value"
  method: GET
  path: /_probe/probe.php
  compare_mode: mod_lsws
  checks:
    status: 200
    header:X-Custom-Header: "test-value-v1"

- id: HD_P1_002
  group: headers_advanced
  desc: "Multiple security headers"
  method: GET
  path: /_probe/probe.php
  compare_mode: mod_lsws
  checks:
    status: 200
    header:X-Frame-Options: "SAMEORIGIN"
    header:X-Content-Type-Options: "nosniff"

- id: HD_P1_003
  group: headers_advanced
  desc: "Header append functionality"
  method: GET
  path: /_probe/probe.php
  compare_mode: mod_lsws
  checks:
    status: 200
    header:X-Test-Append_contains: "appended"

- id: HD_P1_004
  group: headers_advanced
  desc: "Header unset removes X-Powered-By"
  method: GET
  path: /_probe/probe.php
  compare_mode: mod_lsws
  checks:
    status: 200
    header:X-Powered-By: null

- id: HD_P1_005
  group: headers_advanced
  desc: "Custom header in subdir"
  method: GET
  path: /subdir/_probe/probe.php
  compare_mode: mod_lsws
  checks:
    status: 200
    header:X-Custom-Header: "subdir-override-v1"

- id: HD_P1_006
  group: headers_advanced
  desc: "Subdir-specific header"
  method: GET
  path: /subdir/_probe/probe.php
  compare_mode: mod_lsws
  checks:
    status: 200
    header:X-Subdir-Header: "subdir-only"

- id: HD_P1_007
  group: headers_advanced
  desc: "Header always set on success"
  method: GET
  path: /_probe/probe.php
  compare_mode: mod_lsws
  checks:
    status: 200
    header:X-Frame-Options: "SAMEORIGIN"

- id: HD_P1_008
  group: headers_advanced
  desc: "ExpiresByType for CSS"
  method: GET
  path: /style.css
  compare_mode: htaccess
  checks:
    status: 200
    header:Cache-Control_contains: "max-age"

