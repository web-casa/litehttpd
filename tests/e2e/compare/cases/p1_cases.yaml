# ---------------------------------------------------------------------------
# Group: rewrite_advanced (6 cases)
# ---------------------------------------------------------------------------
- id: RW_P1_001
  group: rewrite_advanced
  desc: "Multiple RewriteCond — AND logic (fallback)"
  method: GET
  path: /api/v1/users
  compare_mode: htaccess
  checks:
    status: 200

- id: RW_P1_002
  group: rewrite_advanced
  desc: "Complex path routing"
  method: GET
  path: /mobile/page
  compare_mode: htaccess
  checks:
    status: 200

- id: RW_P1_003
  group: rewrite_advanced
  desc: "Existing HTML file bypasses rewrite"
