services:
  apache24:
    build:
      context: .
      dockerfile: Dockerfile.apache
    container_name: compare-apache24
    ports:
      - "18080:80"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/_probe/probe.php"]
      interval: 3s
      timeout: 2s
      retries: 10

  ols_native:
    build:
      context: .
      dockerfile: Dockerfile.ols-native
    container_name: compare-ols-native
    ports:
      - "28080:8088"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/_probe/probe.php"]
      interval: 3s
      timeout: 2s
      retries: 15

  ols_module:
    build:
      context: .
      dockerfile: Dockerfile.ols-module
    container_name: compare-ols-module
    ports:
      - "38080:8088"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/_probe/probe.php"]
      interval: 3s
      timeout: 2s
      retries: 15

  lsws:
    build:
      context: .
      dockerfile: Dockerfile.lsws
    container_name: compare-lsws
    ports:
      - "48080:80"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/_probe/probe.php"]
      interval: 5s
      timeout: 3s
      retries: 20
