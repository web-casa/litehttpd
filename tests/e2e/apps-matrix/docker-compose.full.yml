services:
  apache:
    image: "${MATRIX_APACHE_IMAGE:-apps-matrix-apache:local}"
    build:
      context: ../../..
      dockerfile: tests/e2e/apps-matrix/Dockerfile.apache-runtime
    ports:
      - "${MATRIX_APACHE_PORT:-18080}:80"
    volumes:
      - "${MATRIX_APACHE_VOLUME_ROOT:-./out/fixtures/docroots/apache/wordpress-core}:/var/www/html"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APPS_MATRIX_APACHE_DOCROOT: "${MATRIX_APACHE_CONTAINER_DOCROOT:-/var/www/html}"
    command:
      - bash
      - -lc
      - |
        docroot="$${APPS_MATRIX_APACHE_DOCROOT:-/var/www/html}"
        sed -ri "s#DocumentRoot .+#DocumentRoot $${docroot}#" /etc/apache2/sites-available/000-default.conf
        {
          echo "<Directory $${docroot}>"
          echo '  AllowOverride All'
          echo '  Require all granted'
          echo '</Directory>'
        } > /etc/apache2/conf-enabled/apps-matrix.conf
        apache2-foreground
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 20

  ols_native:
    image: litespeedtech/openlitespeed:latest
    ports:
      - "${MATRIX_OLS_NATIVE_PORT:-28080}:8088"
    volumes:
      - "${MATRIX_OLS_NATIVE_VOLUME_ROOT:-./out/fixtures/docroots/ols_native/wordpress-core}:/var/www/vhosts/localhost/html"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APPS_MATRIX_OLS_DOCROOT: "${MATRIX_OLS_NATIVE_CONTAINER_DOCROOT:-/var/www/vhosts/localhost/html}"
    entrypoint:
      - /bin/bash
      - -lc
      - |
        set -e
        docroot="$${APPS_MATRIX_OLS_DOCROOT:-/var/www/vhosts/localhost/html}"
        for vhconf in /usr/local/lsws/conf/vhosts/Example/vhconf.conf /usr/local/lsws/conf/vhosts/localhost/vhconf.conf; do
          if [ -f "$${vhconf}" ]; then
            sed -i "s|^[[:space:]]*docRoot[[:space:]].*|  docRoot                  $${docroot}|" "$${vhconf}" || true
          fi
        done
        mkdir -p /usr/local/lsws/logs
        touch /usr/local/lsws/logs/error.log /usr/local/lsws/logs/access.log
        /usr/local/lsws/bin/lswsctrl start
        trap '/usr/local/lsws/bin/lswsctrl stop >/dev/null 2>&1 || true; exit 0' INT TERM
        tail -F /usr/local/lsws/logs/error.log /usr/local/lsws/logs/access.log
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/"]
      interval: 5s
      timeout: 3s
      retries: 20

  ols_module:
    image: "${MATRIX_OLS_MODULE_IMAGE:-apps-matrix-ols-module:local}"
    build:
      context: ../../..
      dockerfile: tests/e2e/Dockerfile.custom-ols
      args:
        OLS_BUILD_JOBS: "${MATRIX_OLS_BUILD_JOBS:-2}"
        OLS_RPM_BUILD_MODE: "${MATRIX_OLS_RPM_BUILD_MODE:-build}"
    ports:
      - "${MATRIX_OLS_MODULE_PORT:-38080}:8088"
    volumes:
      - "${MATRIX_OLS_MODULE_VOLUME_ROOT:-./out/fixtures/docroots/ols_module/wordpress-core}:/var/www/vhosts/localhost/html"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APPS_MATRIX_OLS_DOCROOT: "${MATRIX_OLS_MODULE_CONTAINER_DOCROOT:-/var/www/vhosts/localhost/html}"
    entrypoint:
      - /bin/bash
      - -lc
      - |
        set -e
        docroot="$${APPS_MATRIX_OLS_DOCROOT:-/var/www/vhosts/localhost/html}"
        for vhconf in /usr/local/lsws/conf/vhosts/Example/vhconf.conf /usr/local/lsws/conf/vhosts/localhost/vhconf.conf; do
          if [ -f "$${vhconf}" ]; then
            sed -i "s|^[[:space:]]*docRoot[[:space:]].*|  docRoot                  $${docroot}|" "$${vhconf}" || true
          fi
        done
        mkdir -p /usr/local/lsws/logs
        touch /usr/local/lsws/logs/error.log /usr/local/lsws/logs/access.log
        /usr/local/lsws/bin/lswsctrl start
        trap '/usr/local/lsws/bin/lswsctrl stop >/dev/null 2>&1 || true; exit 0' INT TERM
        tail -F /usr/local/lsws/logs/error.log /usr/local/lsws/logs/access.log
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/"]
      interval: 5s
      timeout: 3s
      retries: 20

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: "${MATRIX_REAL_DB_ROOT_PASSWORD:-rootpass}"
      MYSQL_DATABASE: matrix
      MYSQL_USER: "${MATRIX_REAL_DB_USER:-matrix}"
      MYSQL_PASSWORD: "${MATRIX_REAL_DB_PASSWORD:-matrixpass}"
    ports:
      - "${MATRIX_REAL_DB_PORT:-33306}:3306"
    healthcheck:
      test: ["CMD", "mariadb", "-uroot", "-p${MATRIX_REAL_DB_ROOT_PASSWORD:-rootpass}", "-e", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 20
