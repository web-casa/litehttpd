scenario: mediawiki
app: mediawiki
purpose: pretty URL routing, protected maintenance paths, and static asset cache behavior

cases:
  - id: MEDIAWIKI_001
    category: app-health
    desc: canonical main page returns 200
    method: GET
    path: /wiki/Main_Page
    assert:
      - status_exact: 200
      - body_contains: MediaWiki has been installed

  - id: MEDIAWIKI_002
    category: routing
    desc: homepage redirects to canonical pretty URL
    method: GET
    path: /
    assert:
      - status_exact: 301
      - location_exact: /wiki/Main_Page

  - id: MEDIAWIKI_003
    category: deny
    desc: maintenance script path is not directly accessible
    method: GET
    path: /maintenance/run.php
    assert:
      - status_exact: 403

  - id: MEDIAWIKI_004
    category: ttl
    desc: shipped static asset publishes cache TTL
    method: GET
    path: /resources/assets/wiki.png
    assert:
      - status_exact: 200
      - ttl_close: 86400

  - id: MEDIAWIKI_005
    category: htaccess
    desc: protected includes/private paths are not browseable
    method: GET
    path: /includes/
    assert:
      - status_exact: 403
