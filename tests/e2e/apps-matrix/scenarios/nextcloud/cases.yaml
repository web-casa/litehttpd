scenario: nextcloud
app: nextcloud
purpose: security headers, protected paths, and no-index behavior under complex shipped htaccess

cases:
  - id: NEXTCLOUD_001
    category: app-health
    desc: login page returns 200
    method: GET
    path: /login
    assert:
      - status_exact: 200

  - id: NEXTCLOUD_002
    category: headers
    desc: expected security header is present on login response
    method: GET
    path: /login
    assert:
      - status_exact: 200

  - id: NEXTCLOUD_003
    category: deny
    desc: sensitive config path is not exposed
    method: GET
    path: /config/config.php
    assert:
      - status_in: 403,404
      - body_not_contains: dbpassword

  - id: NEXTCLOUD_004
    category: deny
    desc: protected data directory is not exposed
    method: GET
    path: /data/
    assert:
      - status_in: 403,404
      - body_not_contains: ocdata

  - id: NEXTCLOUD_005
    category: htaccess
    desc: shipped htaccess behavior remains observable after install
    method: GET
    path: /robots.txt
    assert:
      - status_exact: 200
